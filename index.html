<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andrea Sofia Gonzalez Baez</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e0d8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
  }

  .page {
    width: 794px;
    min-height: 1123px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  /* Top bar */
  .top-bar {
    position: absolute;
    top: 0; right: 0;
    width: 65%;
    height: 18px;
    background: #7a9abf;
    border-radius: 0 0 0 30px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0;
    width: 55%;
    height: 18px;
    background: #7a9abf;
    border-radius: 0 30px 0 0;
  }

  /* Date area */
  .date-block {
    position: absolute;
    top: 28px;
    left: 40px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    color: #3a3a3a;
    line-height: 1.7;
    text-transform: uppercase;
  }

  /* Diagonal decorative diamond shapes */
  .diamond-bg {
    position: absolute;
    top: 200px;
    left: -60px;
    width: 340px;
    height: 340px;
    background: linear-gradient(135deg, rgba(122,154,191,0.13), rgba(122,154,191,0.04));
    transform: rotate(45deg);
    border-radius: 18px;
  }
  .diamond-bg2 {
    position: absolute;
    top: 420px;
    left: 40px;
    width: 220px;
    height: 220px;
    background: linear-gradient(135deg, rgba(122,154,191,0.08), transparent);
    transform: rotate(45deg);
    border-radius: 12px;
  }

  /* Logo / icon area */
  .logo-area {
    position: absolute;
    top: 55px;
    right: 50px;
    width: 90px;
    height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #7a9abf;
    border-radius: 50%;
    background: rgba(122,154,191,0.06);
  }

  .logo-area svg {
    width: 40px;
    height: 40px;
    stroke: #7a9abf;
    fill: none;
    stroke-width: 1.3;
  }

  .logo-label {
    font-size: 8.5px;
    letter-spacing: 1.2px;
    color: #7a9abf;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 5px;
    text-align: center;
    line-height: 1.3;
  }

  /* Name / title block */
  .name-block {
    position: absolute;
    top: 130px;
    left: 40px;
  }

  .name-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #2c2c2c;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .name-block .subtitle {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #2c2c2c;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  /* Body text */
  .body-text {
    position: absolute;
    top: 295px;
    left: 60px;
    right: 60px;
  }

  .body-text p {
    font-family: 'Lato', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    color: #3a3a3a;
    line-height: 1.8;
    margin-bottom: 20px;
    text-align: justify;
  }

  /* Signature area */
  .signature-area {
    position: absolute;
    bottom: 60px;
    left: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .sig-circle {
    width: 72px;
    height: 72px;
    border: 1.5px solid #aabccc;
    border-radius: 12px;
    background: rgba(122,154,191,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }

  .sig-circle svg {
    width: 40px;
    height: 40px;
    stroke: #7a9abf;
    fill: none;
    stroke-width: 1.2;
  }

  .sig-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: #2c2c2c;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="page">

  <!-- Decorative bars -->
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <!-- Background diamonds -->
  <div class="diamond-bg"></div>
  <div class="diamond-bg2"></div>

  <!-- Date -->
  <div class="date-block">
    Fecha:<br>13/Mayo/26
  </div>

  <!-- Logo -->
  <div class="logo-area">
    <!-- Airplane icon -->
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 30l8-4 4 8 6-2-4-10 10-5 8 2 2-4-8-6 2-6-4-2-4 6-10 2-2-8-4 2 2 8-8 4z" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div class="logo-label">Flight<br>Attendant</div>
  </div>

  <!-- Name block -->
  <div class="name-block">
    <h1>Andrea Sofia Gonzalez Baez</h1>
    <div class="subtitle">
      Aspirante a la carrera de<br>
      Azafata / Tripulación de Cabina<br>
      Cobaej plantel #21
    </div>
  </div>

  <!-- Body text -->
